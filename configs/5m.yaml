# 5M micro-proxy (DECISIONS.md D7 naming) — the daily-driver for HP sweeps & ablations.
# vocab 4096 keeps the embedding table ~14% of params so ablations transfer to 30M (DECISIONS.md D3).
name: 5m

# --- architecture (research/01) ---
d_model: 256
n_layers: 6
n_heads: 8
n_kv_heads: 2          # GQA 4:1
vocab_size: 4096       # overwritten at train time to the real tokenizer size
max_seq_len: 512       # TinyStories are short
rope_theta: 500000.0

# --- training (research/02) ---
batch_size: 32
max_steps: 4000
warmup_steps: 100
lr: 6.0e-4
min_lr: 6.0e-5
weight_decay: 0.1
grad_clip: 1.0
eval_interval: 250
eval_steps: 50
